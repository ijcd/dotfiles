# ─────────────────────────────────────────────────────────────────────────────
# ssh.conf — RED ALERT tmux config for incoming SSH sessions.
#
# Loaded via `tmux -L ssh -f ~/.config/tmux/ssh.conf ...` from
# dot_config/zsh/interactive.zsh's auto-attach block. Runs on its own socket
# so it can't collide with local tmux state or styling.
#
# Purpose: make it VISUALLY IMPOSSIBLE to forget you're on a remote host.
#
# Design: single normal status bar at BOTTOM, and pane-border-status at TOP
# repurposed as an SSH banner strip across the full pane width. tmux stacks
# multiple `status` bars at the same position, so the top banner has to come
# from a different mechanism.
# ─────────────────────────────────────────────────────────────────────────────

# Inherit base bindings (prefix C-j, splits, mouse, etc.)
source-file ~/.config/tmux/tmux.conf

# ─────────────────────────────────────────────────────────────────────────────
# BOTTOM: single status bar, red-styled with hostname prominent
# ─────────────────────────────────────────────────────────────────────────────

set -g status on
set -g status-position bottom
set -g status-style "bg=colour88,fg=colour231,bold"

set -g status-left-length 30
set -g status-left  "#[fg=colour231,bg=colour196,bold] SSH #[fg=colour196,bg=colour88] #[fg=colour231,bg=colour88,bold]#S "

set -g status-right-length 80
set -g status-right "#[fg=colour231] %F %T #[fg=colour196,bg=colour88]#[fg=colour231,bg=colour196,bold] #H "

setw -g window-status-format         "#[fg=colour231,bg=colour88] #I:#W "
setw -g window-status-current-format "#[fg=colour16,bg=colour231,bold] #I:#W "
setw -g window-status-activity-style "bg=colour208,fg=colour16"

# ─────────────────────────────────────────────────────────────────────────────
# TOP: pane-border-status at top of every pane, styled as a red SSH banner
# ─────────────────────────────────────────────────────────────────────────────
# `pane-border-status top` draws a strip at the top of each pane; combined
# with `pane-border-format` filling it with a red banner, this acts as a
# persistent top-of-screen SSH indicator. Works with single-pane windows
# in tmux 3.0+ (bearcat has 3.6a).

set -g pane-border-status top
set -g pane-border-format "#[bg=colour196,fg=colour231,bold,align=centre]  ▓▓▓  SSH SESSION → #H  ▓▓▓  "
set -g pane-border-lines heavy

set -g pane-border-style        "fg=colour196,bg=colour196"
set -g pane-active-border-style "fg=colour231,bg=colour196,bold"

# ─────────────────────────────────────────────────────────────────────────────
# Terminal window/tab title — makes kitty tab strip and ghostty header
# also display "SSH → host" as an out-of-band third indicator.
# ─────────────────────────────────────────────────────────────────────────────

set -g set-titles on
set -g set-titles-string "SSH → #H: #S · #W"

# ─────────────────────────────────────────────────────────────────────────────
# Message style (command line at bottom when using tmux commands)
# ─────────────────────────────────────────────────────────────────────────────

set -g message-style "bg=colour231,fg=colour52,bold"
